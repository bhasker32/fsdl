<!DOCTYPE html>
<html>
<head>
<title>Digital Glossary</title>
<style>table {border-collapse: collapse; width: 100%;} th, td {border: 1px solid black; padding: 8px;} input {margin-bottom: 10px; padding: 5px;}</style>
</head>
<body>
  <h2>Digital Glossary</h2>
  <input type="text" id="search" onkeyup="filter()" placeholder="Search tags...">
  <table id="glossary">
    <tr><th>Tag</th><th>Description</th></tr>
    <tr><td>&lt;b&gt;</td><td>Bold text</td></tr>
    <tr><td>&lt;i&gt;</td><td>Italic text</td></tr>
    <tr><td>&lt;a&gt;</td><td>Hyperlink</td></tr>
    <tr><td>&lt;div&gt;</td><td>Block container</td></tr>
  </table>

  <script>
    function filter() {
      let input = document.getElementById("search").value.toUpperCase();
      let rows = document.getElementById("glossary").getElementsByTagName("tr");
      for (let i = 1; i < rows.length; i++) { 
        let text = rows[i].getElementsByTagName("td")[0].innerText;
        rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
      }
    }
  </script>
</body>
</html>
