<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; }
  .bar-container { width: 100%; background: #ddd; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
  .bar { height: 25px; background: #28a745; width: 0%; transition: width 0.5s; display: flex; align-items: center; padding-left: 10px; color: white; font-weight: bold; box-sizing: border-box; white-space: nowrap; }
  .input-group { margin-bottom: 20px; display: flex; gap: 10px; }
  input { padding: 8px; flex: 1; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #0056b3; }
  h3 { margin-bottom: 5px; color: #333; margin-top: 10px; font-size: 16px; }
</style>
</head>
<body>
  <h2>Skill Bar Component</h2>
  <div class="input-group">
    <input type="text" id="skillName" placeholder="Skill Name (e.g. HTML)">
    <input type="number" id="skillPct" placeholder="% (0-100)">
    <button onclick="addSkill()">Add Skill</button>
  </div>
  
  <div id="skills-list">
    <!-- Skills will be added here dynamically -->
  </div>

  <script>
    function addSkill() {
      let nameInput = document.getElementById("skillName");
      let pctInput = document.getElementById("skillPct");
      
      let name = nameInput.value.trim();
      let pct = Math.min(100, Math.max(0, parseInt(pctInput.value) || 0));
      
      if (!name) return alert("Please enter a skill name.");
      
      let list = document.getElementById("skills-list");
      
      let html = `
        <h3>${name}</h3>
        <div class="bar-container">
          <div class="bar" style="width: 0%">${pct}%</div>
        </div>
      `;
      
      let div = document.createElement('div');
      div.innerHTML = html;
      list.appendChild(div);
      
      // Animate the bar after appending it to the DOM
      setTimeout(() => {
        div.querySelector('.bar').style.width = pct + "%";
      }, 50);
      
      // Clear inputs
      nameInput.value = "";
      pctInput.value = "";
    }
  </script>
</body>
</html>
