<!DOCTYPE html>
<html>
<head><style>body{display:flex; gap:30px; font-family:sans-serif;} .form, .card{border:1px solid #ccc; padding:20px; border-radius:8px; width:300px;} input, textarea{width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;}</style></head>
<body>
  <div class="form">
    <h2>Profile Info</h2>
    <input type="text" id="name" oninput="update()" placeholder="Full Name">
    <input type="text" id="job" oninput="update()" placeholder="Job Title">
    <textarea id="bio" oninput="update()" placeholder="Short Bio"></textarea>
  </div>
  <div class="card">
    <h2 id="c-name" style="margin:0;">Your Name</h2>
    <h4 id="c-job" style="color:#666; margin-top:5px;">Job Title</h4>
    <p id="c-bio">Your bio will appear here.</p>
  </div>
  <script>
    function update() {
      document.getElementById("c-name").innerText = document.getElementById("name").value || 'Your Name';
      document.getElementById("c-job").innerText = document.getElementById("job").value || 'Job Title';
      document.getElementById("c-bio").innerText = document.getElementById("bio").value || 'Your bio will appear here.';
    }
  </script>
</body></html>
