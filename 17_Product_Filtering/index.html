<!DOCTYPE html>
<html>
<head><style>
  body{font-family:sans-serif;} 
  select{padding:8px; font-size:16px; margin-bottom:20px;} 
  .grid{display:flex; gap:10px; flex-wrap:wrap;}
  .item {border:1px solid #ccc; padding:20px; border-radius:5px; text-align:center; width:120px; background:#fafafa;}
</style></head>
<body>
  <h2>Filter Products</h2>
  <select id="cat" onchange="filter()">
    <option value="all">Show All Categories</option>
    <option value="electronics">Electronics</option>
    <option value="clothing">Clothing</option>
    <option value="books">Books</option>
  </select>
  <div class="grid" id="items">
    <div class="item" data-cat="electronics">📱 Phone<br><small>Electronics</small></div>
    <div class="item" data-cat="clothing">👕 T-Shirt<br><small>Clothing</small></div>
    <div class="item" data-cat="electronics">💻 Laptop<br><small>Electronics</small></div>
    <div class="item" data-cat="books">📚 Novel<br><small>Books</small></div>
    <div class="item" data-cat="clothing">👖 Jeans<br><small>Clothing</small></div>
  </div>
  <script>
    function filter() {
      let c = document.getElementById('cat').value;
      document.querySelectorAll('.item').forEach(el => {
        el.style.display = (c === 'all' || el.getAttribute('data-cat') === c) ? 'block' : 'none';
      });
    }
  </script>
</body></html>
