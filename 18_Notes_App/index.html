<!DOCTYPE html>
<html>
<head><style>
  body{font-family:sans-serif; background:#f4f4f4; padding:20px;} 
  .app{max-width:400px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
  textarea{width:100%; height:80px; padding:10px; box-sizing:border-box; margin-bottom:10px; border:1px solid #ccc;}
  button.add{width:100%; padding:10px; background:#007bff; color:white; border:none; cursor:pointer; font-size:16px;}
  ul{list-style:none; padding:0;}
  li{background:#fff3cd; padding:15px; margin-top:15px; border-left:5px solid #ffc107; position:relative;}
  .del{position:absolute; top:10px; right:10px; background:red; color:white; border:none; cursor:pointer; padding:5px;}
</style></head>
<body>
  <div class="app">
    <h2>Notes App</h2>
    <textarea id="note" placeholder="Write a new note..."></textarea>
    <button class="add" onclick="add()">Save Note</button>
    <ul id="notes"></ul>
  </div>
  <script>
    let notes = JSON.parse(localStorage.getItem('my_notes') || '[]');
    function render() {
      document.getElementById('notes').innerHTML = notes.map((n,i) => 
        '<li>' + n.replace(/\n/g, '<br>') + '<button class="del" onclick="del('+i+')">X</button></li>'
      ).join('');
      localStorage.setItem('my_notes', JSON.stringify(notes));
    }
    function add() { 
      let v = document.getElementById('note').value;
      if(v.trim()) { notes.unshift(v); document.getElementById('note').value=""; render(); } 
    }
    function del(i) { notes.splice(i, 1); render(); }
    render();
  </script>
</body></html>
