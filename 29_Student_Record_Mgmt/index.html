<!DOCTYPE html>
<html>
<head><style>
  body{font-family:sans-serif; background:#f4f4f4; padding:20px;} 
  .container{max-width:600px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
  input{width:calc(33% - 15px); padding:10px; margin-right:10px; margin-bottom:15px; border:1px solid #ccc;}
  button{padding:10px 20px; background:#28a745; color:white; border:none; cursor:pointer;}
  table{width:100%; border-collapse:collapse; margin-top:20px;}
  th, td{padding:10px; border:1px solid #ddd; text-align:left;}
  th{background:#f8f9fa;}
  .delete-btn{background:#dc3545; padding:5px 10px; font-size:12px;}
</style></head>
<body>
  <div class="container">
    <h2>Student Record Management</h2>
    <p style="color:#666; font-size:0.9em;"><i>* Data stored locally (simulating DB insertion/retrieval)</i></p>
    
    <div style="display:flex; flex-wrap:wrap;">
      <input type="text" id="name" placeholder="Student Name">
      <input type="text" id="roll" placeholder="Roll Number">
      <input type="text" id="branch" placeholder="Branch">
    </div>
    <button onclick="addRecord()">Add Student to Database</button>
    
    <table>
      <thead><tr><th>Name</th><th>Roll No</th><th>Branch</th><th>Action</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    const dbKey = 'student_records_db';
    
    function getDB() { return JSON.parse(localStorage.getItem(dbKey) || '[]'); }
    function saveDB(data) { localStorage.setItem(dbKey, JSON.stringify(data)); }
    
    function addRecord() {
      let n = document.getElementById('name').value;
      let r = document.getElementById('roll').value;
      let b = document.getElementById('branch').value;
      if(!n || !r || !b) return alert('Please fill all fields');
      
      let db = getDB();
      db.push({name: n, roll: r, branch: b});
      saveDB(db);
      
      document.getElementById('name').value = document.getElementById('roll').value = document.getElementById('branch').value = '';
      renderTable();
    }
    
    function deleteRecord(index) {
      let db = getDB();
      db.splice(index, 1);
      saveDB(db);
      renderTable();
    }
    
    function renderTable() {
      let html = '';
      getDB().forEach((s, index) => {
        html += '<tr><td>'+s.name+'</td><td>'+s.roll+'</td><td>'+s.branch+'</td>';
        html += '<td><button class="delete-btn" onclick="deleteRecord('+index+')">Delete</button></td></tr>';
      });
      document.getElementById('table-body').innerHTML = html;
    }
    
    renderTable();
  </script>
</body></html>
