<!DOCTYPE html>
<html>
<head><style>
  body{font-family:sans-serif; background:#e9ecef; display:flex; justify-content:center; padding:40px 0;}
  .card{background:#fff; padding:30px; border-radius:8px; width:450px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
  .form-group{margin-bottom:15px;}
  label{display:block; margin-bottom:5px; font-weight:bold; color:#444;}
  input, select{width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;}
  button.btn{width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer; margin-top:10px;}
  .list-area{margin-top:30px; border-top:1px solid #eee; padding-top:20px;}
  .badge{background:#17a2b8; color:white; padding:3px 8px; border-radius:12px; font-size:12px; float:right;}
</style></head>
<body>
  <div class="card">
    <h2 style="text-align:center; margin-top:0;">Hackathon Registration</h2>
    <div class="form-group">
      <label>Participant Name</label>
      <input type="text" id="pName">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="pEmail">
    </div>
    <div class="form-group">
      <label>Select Event</label>
      <select id="pEvent">
        <option value="Web Dev">Web Development</option>
        <option value="AI / ML">AI / Machine Learning</option>
        <option value="Blockchain">Blockchain</option>
      </select>
    </div>
    <button class="btn" onclick="register()">Register Now</button>
    
    <div class="list-area">
      <h3>Registered Attendees</h3>
      <ul id="attendeeList" style="list-style:none; padding:0; margin:0;"></ul>
    </div>
  </div>

  <script>
    function register() {
      let name = document.getElementById('pName').value;
      let email = document.getElementById('pEmail').value;
      let event = document.getElementById('pEvent').value;
      if(!name || !email) return alert('Name and Email required');
      
      let data = JSON.parse(localStorage.getItem('hackathon_db') || '[]');
      data.push({name, email, event});
      localStorage.setItem('hackathon_db', JSON.stringify(data));
      
      document.getElementById('pName').value = document.getElementById('pEmail').value = '';
      loadAttendees();
    }
    
    function loadAttendees() {
      let data = JSON.parse(localStorage.getItem('hackathon_db') || '[]');
      let ul = document.getElementById('attendeeList');
      ul.innerHTML = data.map(d => 
        '<li style="padding:10px; border-bottom:1px solid #eee;">' + 
        '<b>' + d.name + '</b><br><small style="color:#666;">' + d.email + '</small>' +
        '<span class="badge">' + d.event + '</span></li>'
      ).join('');
    }
    
    loadAttendees();
  </script>
</body></html>
